name: Compile LaTeX Report and Release

on:
  push:
    branches: [ main, master ]
    paths:
      - 'docs/paper/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install LaTeX and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-science \
            texlive-bibtex-extra \
            poppler-utils

      - name: Build Diagram and Report
        run: |
          cd "docs/paper"
          make all

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "paper-v${{ github.run_number }}"
          name: "TennisVision Paper"
          body: |
            Automated build of the LaTeX report.
            
            **Commit:** ${{ github.sha }}
            **Message:** ${{ github.event.head_commit.message }}
          files: docs/paper/TennisVisionPaper.pdf
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
